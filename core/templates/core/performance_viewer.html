{% extends 'core/base.html' %}

{% block content %}
<style>
    .viewer-shell {
        font-family: 'Inter', sans-serif;
        max-width: 1680px;
        margin: 0 auto;
        padding-top: 0.35rem;
    }
    .viewer-headline { font-size: 1.125rem; font-weight: 700; color: #0f172a; line-height: 1.35; }
    .viewer-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 18px 20px; box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04); }
    .viewer-dashboard-hero {
        padding: 1rem 1.25rem !important;
        margin-bottom: 1rem;
    }
    .viewer-eyebrow {
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 800;
        color: #64748b;
    }
    .viewer-kpi-period-band {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 0;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 0.85rem 1rem 0.9rem 1rem;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .viewer-kpi-strip {
        flex: none;
        width: 100%;
        display: flex;
        min-width: 0;
        border: 1px solid #e8ecf1;
        border-radius: 12px;
        overflow: hidden;
        background: #fafbfc;
    }
    .viewer-kpi-pill {
        flex: 1 1 0;
        min-width: 7.5rem;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 0.75rem;
        padding: 0.65rem 0.95rem;
        background: #fff;
        border: 0;
        border-right: 1px solid #eef2f7;
        color: inherit;
        text-align: left;
        min-height: 76px;
        transition: background 0.12s ease, box-shadow 0.12s ease;
    }
    a.viewer-kpi-pill:hover {
        background: #f8fafc;
        color: inherit;
    }
    .viewer-kpi-pill:last-child { border-right: 0; }
    .viewer-kpi-pill-visual {
        flex: 0 0 auto;
        width: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .viewer-kpi-pill-body {
        flex: 1 1 auto;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 3px;
        line-height: 1.25;
    }
    .viewer-kpi-pill-label {
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #64748b;
    }
    .viewer-kpi-pill-value {
        font-size: 1.5rem;
        font-weight: 800;
        color: #0f172a;
        font-variant-numeric: tabular-nums;
        line-height: 1.1;
    }
    .viewer-kpi-pill-value.met { color: #15803d; }
    .viewer-kpi-pill-value.unmet { color: #b91c1c; }
    .viewer-kpi-pill-meta {
        font-size: 0.72rem;
        font-weight: 600;
        color: #94a3b8;
        line-height: 1.35;
        white-space: normal;
        overflow-wrap: anywhere;
        hyphens: auto;
    }
    .viewer-kpi-pill-ico {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.88rem;
        flex-shrink: 0;
    }
    .viewer-kpi-pill-ico.met { background: #dcfce7; color: #16a34a; }
    .viewer-kpi-pill-ico.unmet { background: #fee2e2; color: #dc2626; }
    .viewer-kpi-pill-active.viewer-kpi-pill--met {
        background: #f0fdf4;
        box-shadow: inset 0 0 0 1px #86efac;
    }
    .viewer-kpi-pill-active.viewer-kpi-pill--unmet {
        background: #fef2f2;
        box-shadow: inset 0 0 0 1px #fca5a5;
    }
    .viewer-kpi-pill-ring.viewer-target-ring,
    .viewer-kpi-pill-ring.viewer-gauge {
        width: 44px;
        height: 44px;
    }
    .viewer-kpi-pill-ring.viewer-target-ring .viewer-target-ring-inner,
    .viewer-kpi-pill-ring.viewer-gauge .viewer-gauge-inner {
        width: 34px;
        height: 34px;
        font-size: 0.78rem;
    }
    .viewer-kpi-pill-ring.viewer-gauge .viewer-gauge-inner { font-size: 0.68rem; }
    .viewer-kpi-filters-wrap {
        display: flex;
        flex-wrap: wrap;
        align-items: stretch;
        gap: 0.75rem 1rem;
        flex: none;
        width: 100%;
        min-width: 0;
        margin-top: 0.75rem;
        padding-top: 0.8rem;
        border-top: 1px solid #eef2f7;
    }
    .viewer-kpi-area-rail,
    .viewer-kpi-office-rail {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 0.35rem;
        flex: 1 1 12rem;
        min-width: min(100%, 11.5rem);
        max-width: 20rem;
    }
    .viewer-kpi-office-rail {
        padding-right: 0;
        margin-right: 0;
        border-right: 0;
    }
    .viewer-kpi-filter-divider {
        width: 1px;
        align-self: stretch;
        min-height: 2.75rem;
        background: #e2e8f0;
        flex-shrink: 0;
        margin: 0 0.15rem;
    }
    .viewer-dev-area-select,
    .viewer-office-select {
        border-radius: 10px;
        font-size: 0.84rem;
        font-weight: 600;
        padding-top: 0.45rem;
        padding-bottom: 0.45rem;
        border-color: #e2e8f0;
    }
    .viewer-kpi-period-rail {
        flex: 1 1 16rem;
        min-width: min(100%, 14rem);
        display: flex;
        flex-direction: column;
        flex-wrap: nowrap;
        align-items: flex-start;
        justify-content: center;
        gap: 0.45rem;
        padding: 0;
        margin: 0;
        background: transparent;
        border: none;
        border-radius: 0;
    }
    .viewer-kpi-period-divider {
        width: 1px;
        align-self: stretch;
        min-height: 2.75rem;
        background: #e2e8f0;
        flex-shrink: 0;
        margin: 0 0.15rem;
    }
    .viewer-kpi-period-rail .viewer-filter-label {
        flex: 0 0 auto;
        margin: 0;
        white-space: nowrap;
    }
    .viewer-kpi-period-rail .viewer-filter-bar-inner {
        display: flex;
        align-items: center;
        gap: 8px 10px;
        flex-wrap: wrap;
        justify-content: flex-start;
        width: 100%;
        flex: none;
    }
    .viewer-kpi-label { color: #64748b; font-size: 0.54rem; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 3px; }
    .viewer-kpi-label-inline { display: flex; align-items: baseline; justify-content: center; gap: 4px; flex-wrap: wrap; margin-bottom: 0; }
    .viewer-kpi-period-inline { font-size: 0.52rem; font-weight: 700; color: #94a3b8; text-transform: none; letter-spacing: 0; }
    .viewer-kpi-num { font-size: 1.45rem; font-weight: 800; line-height: 1; color: #0f172a; }
    .viewer-kpi-num.met { color: #16a34a; }
    .viewer-kpi-num.unmet { color: #dc2626; }
    .viewer-kpi-pct { color: #64748b; font-size: 0.63rem; font-weight: 700; margin-top: 3px; line-height: 1; }

    .viewer-gauge { --pct: 0; width: 54px; height: 54px; border-radius: 999px; display: flex; align-items: center; justify-content: center; background: conic-gradient(#16a34a calc(var(--pct) * 1%), #e2e8f0 0); }
    .viewer-gauge-inner { width: 42px; height: 42px; border-radius: 999px; background: white; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #16a34a; font-size: 0.72rem; }
    .viewer-target-ring { width: 54px; height: 54px; border-radius: 999px; display: flex; align-items: center; justify-content: center; background: conic-gradient(#c00000 calc(var(--pct, 100) * 1%), #e2e8f0 0); }
    .viewer-target-ring-inner { width: 42px; height: 42px; border-radius: 999px; background: white; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #0f172a; font-size: 0.88rem; }

    .viewer-filter-bar { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04); }
    .viewer-period-panel.viewer-filter-bar {
        margin-left: auto;
        padding: 10px 12px;
        border-radius: 14px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        justify-content: center;
        gap: 10px;
    }
    .viewer-filter-label { font-size: 0.62rem; font-weight: 800; letter-spacing: 0.6px; text-transform: uppercase; color: #64748b; }
    .viewer-filter-select { width: auto; min-width: 200px; max-width: 100%; font-size: 0.82rem; font-weight: 600; }
    /* Collapsible filters on phone; always visible on tablet+ */
    .viewer-filter-panel { border: 0; margin: 0; }
    .viewer-filter-panel__summary {
        display: none;
        list-style: none;
        cursor: pointer;
        font-size: 0.82rem;
        font-weight: 700;
        color: #334155;
        padding: 0.65rem 0.85rem;
        margin-top: 0.65rem;
        border-radius: 10px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
    }
    .viewer-filter-panel__summary::-webkit-details-marker { display: none; }
    .viewer-filter-panel__summary::after {
        content: '\f078';
        font-family: 'Font Awesome 6 Free';
        font-weight: 900;
        float: right;
        font-size: 0.7rem;
        color: #94a3b8;
        transition: transform 0.15s ease;
    }
    .viewer-filter-panel[open] .viewer-filter-panel__summary::after { transform: rotate(180deg); }
    @media (min-width: 768px) {
        .viewer-filter-panel .viewer-kpi-filters-wrap { display: flex !important; }
    }
    @media (max-width: 767.98px) {
        .viewer-filter-panel__summary { display: block; }
        .viewer-filter-panel:not([open]) .viewer-kpi-filters-wrap { display: none; }
        .viewer-filter-panel .viewer-kpi-filters-wrap {
            margin-top: 0.5rem;
            padding-top: 0.65rem;
            border-top: 1px solid #eef2f7;
        }
        .viewer-kpi-period-band { padding: 0.65rem 0.75rem 0.75rem; }
        .viewer-kpi-strip {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border: 0;
            background: transparent;
            gap: 8px;
        }
        .viewer-kpi-pill {
            flex: none !important;
            min-width: 0 !important;
            min-height: auto !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 12px !important;
            padding: 0.65rem 0.75rem !important;
            border-right: 1px solid #e2e8f0 !important;
            border-bottom: 1px solid #e2e8f0 !important;
        }
        .viewer-kpi-pill-visual { display: none; }
        .viewer-kpi-pill-value { font-size: 1.35rem !important; }
        .viewer-kpi-pill-meta { font-size: 0.65rem; }
        .viewer-dashboard-hero .viewer-eyebrow { display: none; }
        .viewer-dashboard-hero { padding: 0.75rem 0.85rem !important; }
        .viewer-headline { font-size: 1.05rem !important; }
    }

    .viewer-mobile-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 0.75rem;
        max-height: min(68dvh, 620px);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
    }
    .viewer-mobile-card {
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        transition: box-shadow 0.12s ease, transform 0.12s ease;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
    }
    .viewer-mobile-card.viewer-pap-group-start {
        border-top: 2px solid #c00000;
    }
    .viewer-mobile-card:active,
    .viewer-mobile-card.active {
        box-shadow: 0 4px 18px rgba(192, 0, 0, 0.14);
        outline: 2px solid rgba(192, 0, 0, 0.35);
        outline-offset: 1px;
    }
    /* Same outcome band tints as desktop matrix rows */
    .viewer-mobile-card.viewer-outcome-band-0 { background: #fff5f5; }
    .viewer-mobile-card.viewer-outcome-band-1 { background: #ecfdf5; }
    .viewer-mobile-card.viewer-outcome-band-2 { background: #fffbeb; }
    .viewer-mobile-card.viewer-outcome-band-3 { background: #f5f3ff; }
    .viewer-mobile-card.viewer-outcome-band-4 { background: #fff1f2; }
    .viewer-mobile-card.viewer-outcome-band-5 { background: #fff1f2; }
    .viewer-mobile-card.viewer-outcome-band-6 { background: #f7fee7; }
    .viewer-mobile-card.viewer-outcome-band-7 { background: #ffedd5; }
    .viewer-mobile-card.viewer-outcome-band-0.active { background: #fecaca; }
    .viewer-mobile-card.viewer-outcome-band-1.active { background: #a7f3d0; }
    .viewer-mobile-card.viewer-outcome-band-2.active { background: #fde68a; }
    .viewer-mobile-card.viewer-outcome-band-3.active { background: #ddd6fe; }
    .viewer-mobile-card.viewer-outcome-band-4.active { background: #fecdd3; }
    .viewer-mobile-card.viewer-outcome-band-5.active { background: #fecaca; }
    .viewer-mobile-card.viewer-outcome-band-6.active { background: #d9f99d; }
    .viewer-mobile-card.viewer-outcome-band-7.active { background: #fdba74; }
    .viewer-mobile-card__meta {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.4rem 0.55rem;
        padding: 0.45rem 0.65rem;
        background: rgba(255, 255, 255, 0.55);
        border-bottom: 1px solid rgba(15, 23, 42, 0.06);
        font-size: 0.72rem;
        font-weight: 700;
        color: #64748b;
    }
    .viewer-mobile-card__num {
        font-variant-numeric: tabular-nums;
        color: #94a3b8;
    }
    .viewer-mobile-card__office {
        margin-left: auto;
        font-size: 0.68rem;
        font-weight: 600;
        color: #475569;
        max-width: 55%;
        text-align: right;
    }
    .viewer-mobile-matrix { display: flex; flex-direction: column; }
    .viewer-mobile-matrix__cell {
        padding: 0.55rem 0.65rem;
        border-bottom: 1px solid rgba(15, 23, 42, 0.06);
    }
    .viewer-mobile-matrix__label {
        display: block;
        font-size: 0.58rem;
        font-weight: 800;
        letter-spacing: 0.55px;
        text-transform: uppercase;
        margin-bottom: 0.3rem;
        line-height: 1.25;
    }
    .viewer-mobile-matrix__sublabel {
        font-weight: 600;
        text-transform: none;
        letter-spacing: 0;
        opacity: 0.9;
        font-size: 0.52rem;
    }
    .viewer-mobile-matrix__value {
        display: block;
        font-size: 0.78rem;
        line-height: 1.4;
        color: #1e293b;
        word-break: break-word;
    }
    .viewer-mobile-matrix__cell--outcome {
        background: rgba(127, 29, 29, 0.08);
        box-shadow: inset 3px 0 0 #991b1b;
    }
    .viewer-mobile-matrix__cell--outcome .viewer-mobile-matrix__label { color: #7f1d1d; }
    .viewer-mobile-matrix__cell--strategy {
        background: rgba(20, 83, 45, 0.07);
        box-shadow: inset 3px 0 0 #15803d;
    }
    .viewer-mobile-matrix__cell--strategy .viewer-mobile-matrix__label { color: #14532d; }
    .viewer-mobile-matrix__cell--pap {
        background: rgba(134, 53, 68, 0.07);
        box-shadow: inset 3px 0 0 #863544;
    }
    .viewer-mobile-matrix__cell--pap .viewer-mobile-matrix__label { color: #863544; }
    .viewer-mobile-matrix__cell--indicator {
        background: rgba(161, 98, 7, 0.08);
        box-shadow: inset 3px 0 0 #a16207;
    }
    .viewer-mobile-matrix__cell--indicator .viewer-mobile-matrix__label { color: #854d0e; }
    .viewer-mobile-card.viewer-matrix-tone-met .viewer-mobile-matrix__cell--indicator {
        background: linear-gradient(90deg, rgba(34, 197, 94, 0.1), rgba(255, 255, 255, 0.5) 12px);
        box-shadow: inset 3px 0 0 #22c55e;
    }
    .viewer-mobile-card.viewer-matrix-tone-unmet .viewer-mobile-matrix__cell--indicator {
        background: linear-gradient(90deg, rgba(239, 68, 68, 0.1), rgba(255, 255, 255, 0.5) 12px);
        box-shadow: inset 3px 0 0 #ef4444;
    }
    .viewer-mobile-matrix__metrics {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        background: rgba(255, 255, 255, 0.45);
    }
    .viewer-mobile-matrix__metric {
        padding: 0.5rem 0.65rem;
        border-top: 1px solid rgba(15, 23, 42, 0.06);
        border-right: 1px solid rgba(15, 23, 42, 0.06);
        min-height: 3.25rem;
    }
    .viewer-mobile-matrix__metric:nth-child(2n) { border-right: 0; }
    .viewer-mobile-matrix__metric--remarks {
        grid-column: 1 / -1;
        border-right: 0;
    }
    .viewer-mobile-matrix__metric-label {
        display: block;
        font-size: 0.56rem;
        font-weight: 800;
        letter-spacing: 0.45px;
        text-transform: uppercase;
        margin-bottom: 0.25rem;
        line-height: 1.2;
    }
    .viewer-mobile-matrix__metric-value {
        display: block;
        font-size: 0.76rem;
        font-weight: 600;
        color: #1e293b;
        line-height: 1.35;
        word-break: break-word;
    }
    .viewer-mobile-matrix__metric--target .viewer-mobile-matrix__metric-label { color: #6b21a8; }
    .viewer-mobile-matrix__metric--target .viewer-mobile-matrix__metric-value {
        text-align: right;
        font-variant-numeric: tabular-nums;
    }
    .viewer-mobile-matrix__metric--actual .viewer-mobile-matrix__metric-label { color: #86198f; }
    .viewer-mobile-matrix__metric--variance .viewer-mobile-matrix__metric-label { color: #0f766e; }
    .viewer-mobile-matrix__metric--variance .viewer-mobile-matrix__metric-value { font-weight: 700; }
    .viewer-mobile-matrix__metric--status .viewer-mobile-matrix__metric-label { color: #374151; }
    .viewer-mobile-matrix__metric--status .viewer-mobile-matrix__metric-value { text-align: center; }
    .viewer-mobile-matrix__metric--status .viewer-status-block {
        min-width: auto;
        padding: 4px 10px;
        font-size: 0.62rem;
    }
    .viewer-mobile-matrix__metric--remarks .viewer-mobile-matrix__metric-label { color: #525252; }
    .viewer-mobile-matrix__metric--remarks .viewer-mobile-matrix__metric-value {
        font-size: 0.72rem;
        font-weight: 500;
    }

    @media (max-width: 575.98px) {
        .viewer-filter-select { width: 100%; min-width: 0; }
        .viewer-headline { font-size: 1.15rem !important; }
        .viewer-dashboard-hero { padding: 0.85rem !important; }
        .viewer-kpi-pill:nth-child(n) {
            flex: none !important;
        }
        .viewer-kpi-period-rail .viewer-filter-bar-inner {
            flex-direction: column;
            align-items: stretch;
            gap: 0.65rem;
        }
        .viewer-kpi-period-rail .viewer-tabs {
            width: 100%;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .viewer-kpi-period-rail .viewer-tab {
            flex: 1 1 auto;
            min-width: 2.75rem !important;
        }
        .viewer-kpi-period-rail .dropdown { width: 100%; }
        .viewer-kpi-period-rail .dropdown .btn { width: 100%; min-height: 44px; }
        .viewer-table-toolbar {
            flex-direction: column;
            align-items: stretch !important;
        }
        .viewer-table-toolbar > span.text-muted {
            text-align: left !important;
        }
        .viewer-table-toolbar .btn {
            width: 100%;
            min-height: 44px;
        }
        .viewer-scroll-hint {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.85rem;
            font-size: 0.72rem;
            font-weight: 600;
            color: #64748b;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .viewer-scroll-hint i { color: var(--bsu-seal-red, #c00000); }
        .viewer-pagination {
            position: sticky;
            bottom: 0;
            z-index: 5;
            background: #fff;
            box-shadow: 0 -4px 16px rgba(15, 23, 42, 0.06);
            padding-bottom: max(0.65rem, env(safe-area-inset-bottom, 0px)) !important;
        }
        .viewer-pagination .btn {
            flex: 1 1 0;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .viewer-focus-banner {
            flex-direction: column !important;
            align-items: stretch !important;
        }
        .viewer-focus-banner .btn { width: 100%; min-height: 44px; }
    }
    .viewer-scroll-hint { display: none; }
    @media (max-width: 991.98px) {
        .viewer-scroll-hint { display: flex; }
        .viewer-table-wrap {
            max-height: min(52dvh, 480px);
        }
        #viewerIndicatorModal .modal-dialog {
            margin: 0;
            max-width: 100%;
            min-height: 100dvh;
            height: 100%;
        }
        #viewerIndicatorModal .modal-content {
            min-height: 100dvh;
            border-radius: 0;
            border: 0;
        }
        #viewerIndicatorModal .modal-header {
            padding-top: max(1rem, env(safe-area-inset-top, 0px));
            position: sticky;
            top: 0;
            z-index: 2;
            background: #fff;
        }
        .viewer-area-strip {
            grid-template-columns: 1fr;
        }
        .viewer-area-card { min-height: 76px; }
    }
    .viewer-period-meta { font-size: 0.72rem; }

<script>
(function () {
    document.addEventListener('DOMContentLoaded', function () {
        var modalEl = document.getElementById('viewerIndicatorModal');
        if (modalEl) {
            modalEl.addEventListener('hidden.bs.modal', function () {
                document.querySelectorAll('#viewer-area .viewer-table tbody tr.active, #viewer-area .viewer-mobile-card.active').forEach(function (el) {
                    el.classList.remove('active');
                });
            });
        }
        {% if selected_record %}
        htmx.ajax('GET', '{% url "performance_viewer_indicator_detail" selected_record.pk %}', '#viewer-indicator-modal-body');
        setTimeout(function () {
            var pk = String({{ selected_record.pk }});
            var tr = document.querySelector('#viewer-area .viewer-table tbody tr[data-record-pk="' + pk + '"]');
            var card = document.querySelector('#viewer-area .viewer-mobile-card[data-record-pk="' + pk + '"]');
            var row = tr || card;
            if (row) {
                document.querySelectorAll('#viewer-area .viewer-table tbody tr, #viewer-area .viewer-mobile-card').forEach(function (r) {
                    r.classList.remove('active');
                });
                row.classList.add('active');
            }
        }, 0);
        {% endif %}
    });
    document.body.addEventListener('htmx:afterSwap', function (ev) {
        var t = ev.detail && ev.detail.target;
        if (t && t.id === 'viewer-indicator-modal-body') {
            var modalEl = document.getElementById('viewerIndicatorModal');
            if (modalEl && window.bootstrap) {
                bootstrap.Modal.getOrCreateInstance(modalEl).show();
            }
        }
    });
})();
</script>
{% endblock %}

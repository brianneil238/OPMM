{% extends 'core/base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-4" style="border-radius: 16px;">
                <h5 class="fw-bold mb-4">Register Office</h5>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="small fw-bold text-muted">Full Office Name</label>
                        <input type="text" name="full_name" class="form-control border-0 bg-light py-2" placeholder="e.g. Planning and Development Office" required>
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold text-muted">Abbreviation (Login ID)</label>
                        <input type="text" name="abbreviation" class="form-control border-0 bg-light py-2" placeholder="e.g. PDO" required>
                    </div>
                    <div class="mb-4">
                        <label class="small fw-bold text-muted">Password</label>
                        <div class="input-group">
                            <input type="password" name="password" id="passwordField" class="form-control border-0 bg-light py-2" style="border-top-left-radius: 10px; border-bottom-left-radius: 10px;" required>
                            <button class="btn btn-light border-0 bg-light" type="button" onclick="togglePassword()">
                                <i class="fas fa-eye text-muted" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold border-0 shadow-sm rounded-3">
                        Create Account
                    </button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 16px;">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr class="small text-muted text-uppercase">
                            <th class="ps-4 py-3">Full Name</th>
                            <th>Abbreviation</th>
                            <th class="text-end pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for staff in staff_users %}
                        <tr>
                            <td class="ps-4 fw-bold small text-dark">{{ staff.first_name }}</td>
                            <td><span class="badge bg-primary-subtle text-primary px-3 rounded-pill">{{ staff.username }}</span></td>
                            <td class="text-end pe-4">
                                <div class="d-flex justify-content-end gap-2">
                                    <a href="{% url 'edit_user' staff.id %}"
                                       class="btn btn-sm btn-light border rounded-pill px-3 fw-bold"
                                       style="font-size: 0.75rem;">Edit</a>
                                    <a href="{% url 'delete_user' staff.id %}" 
                                       class="btn btn-sm btn-outline-danger rounded-pill px-3 fw-bold" 
                                       style="font-size: 0.75rem;"
                                       onclick="return confirm('Are you sure you want to delete the account for {{ staff.username }}?')">
                                        Delete
                                    </a>
                                </div>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordField = document.getElementById('passwordField');
        const icon = document.getElementById('toggleIcon');
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            passwordField.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>
{% endblock %}
